<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Поиск сообщений в Telegram</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Введите ключевое слово">
            <input type="number" id="messageCount" placeholder="Количество сообщений" value="100" min="1" max="10000">
            <button id="searchBtn">Искать</button>
        </div>
        
        <div class="groups-section">
            <div class="groups-header">
                <h2>Выберите группы</h2>
                <div class="groups-actions">
                    <button id="selectAllBtn" class="small-btn">Выбрать все</button>
                    <button id="deselectAllBtn" class="small-btn">Снять все</button>
                    <span id="groupsCounter" class="groups-counter">Выбрано: 0</span>
                </div>
            </div>
            <div id="groupsList"></div>
        </div>
        
        <div class="results-section">
            <h2>Результаты</h2>
            <div id="results"></div>
        </div>
    </div>
    
    <script src="/src/app.js"></script>
</body>
</html>
