<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Поиск сообщений в Telegram</h1>
            <div class="header-info">
                <div id="sessionInfo" class="session-info">
                    <span class="session-loading">Загрузка...</span>
                </div>
                <div class="header-links">
                    <a href="/livestream.html" class="back-link">Live Stream →</a>
                    <a href="/autosearch.html" class="back-link">Автопоиск →</a>
                    <a href="/broadcast.html" class="back-link">Рассылка →</a>
                    <a href="/sessions.html" class="back-link">Сессии →</a>
                </div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="keywords-container">
                <input type="text" id="searchInput" placeholder="Введите слово и нажмите пробел">
                <div id="keywordsList" class="keywords-list"></div>
            </div>
            <input type="number" id="messageCount" placeholder="Количество сообщений" value="100" min="1" max="10000">
            <button id="searchBtn">Искать</button>
        </div>
        
        <div class="groups-section">
            <div class="groups-header">
                <h2>Выберите группы</h2>
                <div class="groups-actions">
                    <button id="selectAllBtn" class="small-btn">Выбрать все</button>
                    <button id="deselectAllBtn" class="small-btn">Снять все</button>
                    <span id="groupsCounter" class="groups-counter">Выбрано: 0</span>
                </div>
            </div>
            <div id="groupsList"></div>
        </div>

        <div class="ai-section" style="display: none;">
            <h2>AI Анализ найденных сообщений</h2>
            <div class="ai-input-section">
                <textarea id="aiPrompt" placeholder="Введите промпт для AI анализа (например: Содержит ли это сообщение информацию о продаже товаров?)"></textarea>
                <button id="analyzeBtn">Анализировать через AI</button>
            </div>
        </div>
        
        <div class="results-section">
            <div class="results-header">
                <h2>Результаты</h2>
                <button id="clearResultsBtn" class="small-btn" style="display: none;">Очистить результаты</button>
            </div>
            <div id="results"></div>
        </div>
    </div>
    
    
    <script src="/src/app.js"></script>
</body>
</html>
